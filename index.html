<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedi Anes - Balloon Induction</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R8RQEKSQL1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-R8RQEKSQL1');
    </script>
    <style>
        body { 
            margin: 0; padding: 20px; 
            background: #f0f4f8; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; text-align: center;
        }
        .container {
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 100%;
        }
        h1 { color: #2c3e50; margin-top: 0; font-size: 28px; }
        p { color: #7f8c8d; margin-bottom: 30px; font-size: 16px; line-height: 1.5; }

        .btn { 
            display: flex; align-items: center; justify-content: center; 
            width: 100%; padding: 20px; margin-bottom: 20px; 
            border-radius: 15px; text-decoration: none; 
            font-size: 20px; font-weight: bold; color: white; 
            transition: transform 0.2s, box-shadow 0.2s; box-sizing: border-box;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 7px 15px rgba(0,0,0,0.2); }
        .btn:active { transform: translateY(0); }

        .btn-tablet { background: #4CAF50; }
        .btn-phone { background: #2196F3; }

        .icon { font-size: 30px; margin-right: 15px; }
        .qr-section { margin: 30px 0; display: flex; flex-direction: column; align-items: center; }
        .qr-section p { font-size: 14px; margin-bottom: 15px; color: #7f8c8d; }
        #qrcode { padding: 10px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 2px solid #ecf0f1; }
        .footer { margin-top: 20px; font-size: 14px; color: #95a5a6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎈 Balloon Induction</h1>
        <p><strong>Note:</strong> This game requires two devices. Open this page on both devices, then select the proper role for each below.</p>

        <a href="balloon_tablet.html" class="btn btn-tablet">
            <span class="icon">📱</span> Patient Tablet
        </a>

        <a href="balloon_phone.html" class="btn btn-phone">
            <span class="icon">📲</span> Doctor Remote
        </a>

        <div class="qr-section">
            <p>Scan to easily open on another device:</p>
            <div id="qrcode"></div>
        </div>

        <div class="footer">Designed and created by Jasmin Tong</div>
    </div>

    <!-- Include qrcode.js library and generate the QR code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // Clean URL to not include hash/query params directly if unnecessary, or just use as is
        const currentUrl = window.location.href;
        new QRCode(document.getElementById("qrcode"), {
            text: currentUrl,
            width: 128,
            height: 128,
            colorDark : "#2c3e50",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.L
        });
    </script>
</body>
</html>
